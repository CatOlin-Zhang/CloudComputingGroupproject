name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          # 请确保在 GitHub Secrets 中设置的变量名为 EC2_PRIVATE_KEY
          ssh-private-key: ${{ secrets.EC2_PRIVATE_KEY }}

      - name: Deploy application
        run: |
          # 使用 root 用户和您提供的 IP 地址
          ssh -o StrictHostKeyChecking=no root@43.99.17.139 << 'EOF'
          cd ~/chatbot_comp7940
          git pull origin main
          # 重启 chatbot 进程
          pkill -f "python chatbot.py" || true
          nohup ~/chatbot_comp7940/venv/bin/python chatbot.py > app.log 2>&1 &
          EOF