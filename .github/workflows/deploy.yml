name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_PRIVATE_KEY }}

      - name: Deploy via SCP
        run: |
          # 1. 在服务器上创建目标目录（如果不存在）
          ssh -o StrictHostKeyChecking=no root@43.99.17.139 "mkdir -p ~/chatbot_comp7940/chatbot"

          # 2. 使用 SCP 上传文件
          # -r: 递归上传整个文件夹
          # -o StrictHostKeyChecking=no: 跳过首次连接的主机密钥确认
          scp -r -o StrictHostKeyChecking=no ./chatbot/* root@43.99.17.139:~/chatbot_comp7940/chatbot/

          # 3. 在服务器上重启应用
          ssh -o StrictHostKeyChecking=no root@43.99.17.139 << 'EOF'
          cd ~/chatbot_comp7940/chatbot
          # 杀掉旧进程
          pkill -f "python chatbot.py" || true
          # 启动新进程
          nohup ../venv/bin/python chatbot.py > ../app.log 2>&1 &
          echo "Deployment finished."
          EOF