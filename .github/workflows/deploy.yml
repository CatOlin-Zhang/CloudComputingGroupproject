name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_PRIVATE_KEY }}

      - name: Install Rsync (Fix for Exit Code 12)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy application via Rsync
        run: |
          # 将本地的 chatbot 文件夹同步到服务器的 chatbot_comp7940/chatbot 目录
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" ./chatbot/ root@43.99.17.139:~/chatbot_comp7940/chatbot/

          # 在服务器上重启应用
          ssh -o StrictHostKeyChecking=no root@43.99.17.139 << 'EOF'
          cd ~/chatbot_comp7940/chatbot
          # 杀掉旧进程
          pkill -f "python chatbot.py" || true
          # 启动新进程 (后台运行，日志输出到 app.log)
          nohup ../venv/bin/python chatbot.py > ../app.log 2>&1 &
          echo "Deployment finished and bot restarted."
          EOF